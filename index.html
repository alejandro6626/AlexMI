<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alex — MI Expert</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0d47a1 0%, #1976d2 100%);
            --accent-blue: #00bcd4;
            --bg-clinical: #f0f4f8;
        }

        /* Essential Mobile Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; 
            width: 100%; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            position: fixed; 
            background: var(--bg-clinical);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #app { 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            width: 100%; 
            max-width: 100%; 
            background: #fff;
            position: relative;
        }

        /* Desktop centering */
        @media (min-width: 768px) {
            #app { max-width: 500px; margin: 0 auto; border-left: 1px solid #e0e8f0; border-right: 1px solid #e0e8f0; }
        }

        .header { 
            height: 60px;
            background: var(--primary-gradient);
            padding: 0 16px; 
            display: flex; 
            align-items: center; 
            color: white;
            z-index: 10;
            flex-shrink: 0;
        }

        .hname { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .banner { 
            background: #1a237e; color: #fff; padding: 8px 16px; font-size: 10px; font-weight: 500; border-bottom: 2px solid var(--accent-blue);
            flex-shrink: 0;
        }

        .msgs { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px 16px 120px 16px; 
            background: #f8faff;
            -webkit-overflow-scrolling: touch;
        }

        /* Bubbles */
        .msg { display: flex; width: 100%; margin-bottom: 12px; }
        .bubble { max-width: 88%; padding: 12px 16px; font-size: 16px; line-height: 1.5; border-radius: 12px; word-wrap: break-word; }
        .msg.agent .bubble { background: #fff; border-left: 5px solid var(--accent-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .msg.user { justify-content: flex-end; }
        .msg.user .bubble { background: var(--primary-gradient); color: #fff; }

        /* Fixed Input Dock */
        .input-row { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff; 
            padding: 12px 16px; 
            display: flex; 
            align-items: flex-end; 
            gap: 10px; 
            border-top: 1px solid #eef2f7;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            z-index: 999;
        }

        @media (min-width: 768px) {
            .input-row { width: 500px; left: 50%; transform: translateX(-50%); }
        }

        textarea { 
            flex: 1; min-height: 44px; max-height: 100px; padding: 11px 16px; font-size: 16px; border: 1.5px solid #d1d9e6; border-radius: 22px; outline: none; background: #f1f4f9; resize: none;
        }

        #sbtn { 
            width: 44px; height: 44px; border-radius: 50%; background: var(--primary-gradient); border: none; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        /* Mobile Animation Fix */
        .typing-container { display: flex; align-items: center; gap: 8px; }
        .pulse-bar { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
        .bar { 
            width: 4px; 
            background: var(--accent-blue); 
            height: 100%;
            animation: pulse-mobile 0.8s infinite ease-in-out;
            -webkit-animation: pulse-mobile 0.8s infinite ease-in-out;
        }
        .bar:nth-child(2) { animation-delay: 0.1s; -webkit-animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; -webkit-animation-delay: 0.2s; }

        @keyframes pulse-mobile {
            0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
            50% { transform: scaleY(1.0); opacity: 1; }
        }
        @-webkit-keyframes pulse-mobile {
            0%, 100% { -webkit-transform: scaleY(0.4); opacity: 0.4; }
            50% { -webkit-transform: scaleY(1.0); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="hname">Alex — MI Expert</div>
    </div>
    <div class="banner">🛡️ Secure Pharma Intelligence Bridge</div>
    
    <div class="msgs" id="msgs">
        <div id="welcome" style="text-align:center; padding-top:40px;">
            <p style="color:#0d47a1; font-weight:bold;">Local Backend Connected</p>
            <p style="color:#666; font-size:13px; margin-top:5px;">Secure Pharmacovigilance Mode</p>
        </div>
    </div>

    <div class="input-row">
        <textarea id="inp" placeholder="Type clinical query..."></textarea>
        <button id="sbtn" onclick="send()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
const BACKEND_URL = 'http://YOUR_LINUX_IP_OR_DNS:5000/chat';

let busy = false;
const inp = document.getElementById('inp');
const msgs = document.getElementById('msgs');
const sbtn = document.getElementById('sbtn');

const history = [
    { role: 'user', parts: [{ text: "Initialize as Senior Pharmacovigilance MD Alex." }]},
    { role: 'model', parts: [{ text: "System ready." }]}
];

function addMsg(role, text, isError = false){
    document.getElementById('welcome')?.remove();
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    const colorStyle = isError ? 'style="color: #b71c1c; border-left-color: #b71c1c;"' : '';
    const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    d.innerHTML = `<div class="bubble" ${colorStyle}>${formatted}</div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
}

async function send(){
    // Ensure the button always "works" by checking the input first
    const text = inp.value.trim();
    if(!text) return;

    // If a request is already in progress, don't overlap
    if(busy) {
        console.log("System busy: Request ignored.");
        return;
    }

    // UI Updates
    busy = true;
    sbtn.style.opacity = "0.5";
    inp.value = ''; 
    resetHeight();
    addMsg('user', text);
    history.push({role:'user', parts:[{text}]});
    
    // Create Typing/Analyzing Indicator
    const t = document.createElement('div');
    t.id = 'typing'; t.className = 'msg agent';
    t.innerHTML = `<div class="bubble"><div class="typing-container"><div class="pulse-bar"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div><span style="font-size:11px; font-weight:bold; color:#1a237e; letter-spacing:1px">ANALYZING...</span></div></div>`;
    msgs.appendChild(t); 
    msgs.scrollTop = msgs.scrollHeight;

    try {
        // Set a 10-second timeout for the fetch
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: history }),
            signal: controller.signal
        });

        clearTimeout(timeoutId);
        const data = await res.json();
        t.remove();

        if (!res.ok || data.error) {
            throw new Error(data.error || `Server returned ${res.status}`);
        }

        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if(reply) {
            addMsg('agent', reply);
            history.push({role:'model', parts:[{text: reply}]});
        }
    } catch(e) { 
        t.remove();
        let errorMsg = "<strong>COMMUNICATION FAULT:</strong> ";
        
        if (e.name === 'AbortError') {
            errorMsg += "Request timed out. The backend is taking too long to respond.";
        } else if (e.message.includes('Failed to fetch')) {
            errorMsg += "Backend Offline. Ensure your Linux PC is running and port 5000 is forwarded.";
        } else {
            errorMsg += e.message;
        }
        
        addMsg('agent', errorMsg, true);
    } finally {
        busy = false;
        sbtn.style.opacity = "1";
        inp.focus();
    }
}
</script>
</body>
</html>
